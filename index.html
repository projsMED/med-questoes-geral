<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Engine V3.7 - Filtro em Etapas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="container">
  
  <div class="controls-card">
    <h2 class="header-title">Quiz Engine V3.7</h2>
    
    <input type="file" id="fileInput" accept=".json,application/json" class="hidden">

    <div id="uploadSection">
      <p style="text-align:center; color:#666; margin-bottom:20px;">Carregue um arquivo local ou escolha da nuvem.</p>
      <div class="start-buttons">
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">
          📂 Carregar Arquivo Local
        </button>
        <button class="btn btn-info" id="btnCloudStart">
          ☁️ Quizes da Nuvem
        </button>
      </div>
    </div>

    <div id="filterSection" class="hidden">
      <div id="filterDescription" class="filter-description"></div>

      <div id="filterStep1">
        <div class="filter-group">
          <h3>Passo 1: Selecione os Assuntos (Pastas)</h3>
          <div id="folderTree" class="filter-tree"></div>
        </div>
        <div class="step-actions">
          <button class="btn btn-primary" id="btnGoToStep2">Prosseguir para Tags/Dificuldade &rarr;</button>
        </div>
      </div>

      <div id="filterStep2" class="hidden">
        <div class="step-header">
          <button class="btn btn-sm btn-secondary" id="btnBackToStep1">&larr; Voltar para Pastas</button>
          <span class="step-info">Filtrando questões das pastas selecionadas</span>
        </div>

        <div class="filter-row">
          <div class="filter-group half">
            <h3>Passo 2: Filtrar por Tags</h3>
            <div id="tagList" class="filter-grid"></div>
          </div>
          
          <div class="filter-group half">
            <h3>Passo 2: Filtrar por Dificuldade</h3>
            <div id="diffList" class="filter-grid"></div>
          </div>
        </div>

        <div class="generate-action">
          <button class="btn btn-submit" id="btnGenerate">Gerar Quiz</button>
          <button class="btn btn-danger btn-sm" id="btnDeleteFilter" style="margin-top:10px">Cancelar / Deletar</button>
        </div>
      </div>

    </div>

    <div class="config-bar hidden" id="configBar">
      <div class="config-row">
        <strong>Embaralhamento:</strong>
        <label class="toggle-label">
          <input type="checkbox" id="chkShuffleQuestions"> Questões
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="chkShuffleAlternatives"> Alternativas
        </label>
      </div>

      <div class="config-row">
        <strong>Exibição:</strong>
        <label class="toggle-label">
          <input type="checkbox" id="chkShowTags" checked> Tags
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="chkShowDiff"> Dificuldade
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="chkShowFilterSummary" checked> Resumo Filtros
        </label>
      </div>

      <div class="config-actions">
        <button class="btn btn-info" id="btnCloudConfig" title="Abrir Nuvem">☁️ Nuvem</button>
        <button class="btn btn-secondary" id="btnChooseOther" title="Carregar arquivo local">📂 Trocar Arq.</button>
        <button class="btn btn-reset" id="btnResetQuiz" title="Limpar respostas">🔄 Resetar</button>
        <button class="btn btn-danger" id="btnDeleteQuiz" title="Remover quiz atual e voltar ao início">🗑️ Deletar</button>
      </div>
    </div>
  </div>

  <div id="quizContainer"></div>

</div>

<div class="footer-bar hidden" id="footerBar">
  <div class="score-display" id="scoreDisplay">Nota: <span>-</span></div>
  <button class="btn btn-submit" id="btnSubmitAll" style="padding: 10px 30px; font-size: 1.1em;">Responder Todas</button>
</div>

<div id="imgModal">
  <span class="close-modal">&times;</span>
  <img class="modal-content" id="imgModalContent">
</div>

<div id="infoModal" class="modal-overlay hidden">
  <div class="modal-box info-box">
    <div class="modal-header">
      <h3 id="infoModalTitle">Informação</h3>
      <span class="close-info">&times;</span>
    </div>
    <div class="modal-body" id="infoModalBody">
      </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="btnInfoOk">Ok</button>
    </div>
  </div>
</div>

<div id="cloudModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Quizes da Nuvem</h3>
      <span class="close-cloud">&times;</span>
    </div>
    <div class="modal-toolbar">
      <button class="btn btn-sm" id="btnExpandAll">Expandir Tudo</button>
      <button class="btn btn-sm" id="btnCollapseAll">Recolher Tudo</button>
    </div>
    <div class="modal-body">
      <div id="cloudTree" class="tree-container">Carregando...</div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
